<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Days Without Accident</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            color: #ff3b3b;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 2rem;
        }

        #days {
            font-size: min(15vw, 10rem);
            font-weight: bold;
            line-height: 1;
            margin-bottom: 1rem;
        }

        #label {
            font-size: min(4vw, 2rem);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="days">0.000</div>
        <div id="label">Days Without Accident</div>
    </div>

    <script>
        // CHANGE THIS DATE/TIME WHEN AN ACCIDENT OCCURS
        const lastAccident = new Date("2026-06-10T00:00:00");

        function updateCounter() {
            const now = new Date();

            const daysWithoutAccident =
                (now - lastAccident) / (1000 * 60 * 60 * 24);

            document.getElementById("days").textContent =
                daysWithoutAccident.toFixed(9);
        }

        updateCounter();

        // Update every second
        setInterval(updateCounter, 1000/60);
    </script>
</body>
</html>
